name: Release AgentNet CLI to R2

on:
  push:
    tags:
      - "agentnet-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_MANIFEST_PATH: agentnet/cli/sdk/Cargo.toml
  BUILD_DIR: agentnet/cli/sdk
  BIN_NAME: boxty
  RELEASE_PREFIX: agentnet

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            asset_suffix: linux-x86_64
          - runner: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            asset_suffix: darwin-x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            asset_suffix: darwin-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_INPUT="${{ github.event.inputs.version }}"
          else
            VERSION_INPUT="${GITHUB_REF_NAME#agentnet-v}"
          fi

          if [[ ! "${VERSION_INPUT}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: ${VERSION_INPUT}"
            exit 1
          fi

          echo "VERSION=${VERSION_INPUT}" >> "${GITHUB_ENV}"

      - name: Validate Cargo version
        shell: bash
        run: |
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' "${CARGO_MANIFEST_PATH}" | head -n 1)"
          if [[ -z "${CARGO_VERSION}" ]]; then
            echo "Failed to read Cargo version from ${CARGO_MANIFEST_PATH}"
            exit 1
          fi

          if [[ "${CARGO_VERSION}" != "${VERSION}" ]]; then
            echo "Cargo version (${CARGO_VERSION}) does not match release version (${VERSION})"
            exit 1
          fi

      - name: Build release binary
        shell: bash
        working-directory: ${{ env.BUILD_DIR }}
        run: cargo build --release --target "${{ matrix.target }}"

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          ASSET_BASENAME="${BIN_NAME}-v${VERSION}-${{ matrix.asset_suffix }}"
          STAGE_DIR="dist/${ASSET_BASENAME}"
          mkdir -p "${STAGE_DIR}"
          cp "${BUILD_DIR}/target/${{ matrix.target }}/release/${BIN_NAME}" "${STAGE_DIR}/${BIN_NAME}"
          cp "${BUILD_DIR}/README.md" "${STAGE_DIR}/README.md"

          ARCHIVE_NAME="${ASSET_BASENAME}.${{ matrix.archive_ext }}"
          tar -C dist -czf "dist/${ARCHIVE_NAME}" "${ASSET_BASENAME}"

          shasum -a 256 "dist/${ARCHIVE_NAME}" | awk '{print $1}' > "dist/${ARCHIVE_NAME}.sha256"

          {
            echo "ASSET_BASENAME=${ASSET_BASENAME}"
            echo "ARCHIVE_NAME=${ARCHIVE_NAME}"
            echo "SHA256_NAME=${ARCHIVE_NAME}.sha256"
          } >> "${GITHUB_ENV}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: |
            dist/${{ env.ARCHIVE_NAME }}
            dist/${{ env.SHA256_NAME }}
          if-no-files-found: error

  publish:
    name: Publish to R2
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION_INPUT="${{ github.event.inputs.version }}"
          else
            VERSION_INPUT="${GITHUB_REF_NAME#agentnet-v}"
          fi

          echo "VERSION=${VERSION_INPUT}" >> "${GITHUB_ENV}"

      - name: Flatten downloaded artifacts
        shell: bash
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release

      - name: Generate release manifest
        shell: bash
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: |
          if [[ -z "${R2_PUBLIC_BASE_URL}" ]]; then
            echo "Repository variable R2_PUBLIC_BASE_URL is required"
            exit 1
          fi

          python3 - <<'PY'
          from datetime import datetime, timezone
          import glob
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          base_url = os.environ["R2_PUBLIC_BASE_URL"].rstrip("/")
          prefix = f"{os.environ['RELEASE_PREFIX']}/releases/v{version}"
          assets = []

          for archive_path in sorted(glob.glob("release/*.tar.gz")):
              archive = Path(archive_path)
              checksum_path = Path(f"{archive_path}.sha256")
              sha256 = checksum_path.read_text().strip()
              size = archive.stat().st_size

              platform = archive.name.removeprefix(f"{os.environ['BIN_NAME']}-v{version}-").removesuffix(".tar.gz")
              assets.append({
                  "name": archive.name,
                  "platform": platform,
                  "sha256": sha256,
                  "size": size,
                  "url": f"{base_url}/{prefix}/{archive.name}",
                  "sha256Url": f"{base_url}/{prefix}/{checksum_path.name}",
              })

          payload = {
              "name": os.environ["BIN_NAME"],
              "version": version,
              "publishedAt": datetime.now(timezone.utc).isoformat(),
              "assets": assets,
          }

          Path("release/manifest.json").write_text(json.dumps(payload, indent=2) + "\n")
          Path("release/latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Render installer script
        shell: bash
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os

          template = Path("scripts/install-agentnet.sh").read_text()
          rendered = template.replace("__R2_PUBLIC_BASE_URL__", os.environ["R2_PUBLIC_BASE_URL"].rstrip("/"))
          Path("release/install.sh").write_text(rendered)
          PY
          chmod +x release/install.sh

      - name: Configure AWS CLI for R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws configure set aws_access_key_id "${AWS_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${AWS_SECRET_ACCESS_KEY}"
          aws configure set default.region auto
          aws configure set default.output json

      - name: Upload release files to R2
        shell: bash
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
        run: |
          if [[ -z "${R2_ACCOUNT_ID}" || -z "${R2_BUCKET}" ]]; then
            echo "Repository variables R2_ACCOUNT_ID and R2_BUCKET are required"
            exit 1
          fi

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          VERSION_PREFIX="${RELEASE_PREFIX}/releases/v${VERSION}"
          LATEST_PREFIX="${RELEASE_PREFIX}/releases"

          aws s3 cp release/manifest.json "s3://${R2_BUCKET}/${VERSION_PREFIX}/manifest.json" --endpoint-url "${ENDPOINT}" --content-type application/json
          aws s3 cp release/latest.json "s3://${R2_BUCKET}/${LATEST_PREFIX}/latest.json" --endpoint-url "${ENDPOINT}" --content-type application/json
          aws s3 cp release/install.sh "s3://${R2_BUCKET}/install.sh" --endpoint-url "${ENDPOINT}" --content-type text/x-shellscript
          aws s3 cp release/install.sh "s3://${R2_BUCKET}/agentnet/install.sh" --endpoint-url "${ENDPOINT}" --content-type text/x-shellscript

          for file in release/*.tar.gz release/*.sha256; do
            aws s3 cp "${file}" "s3://${R2_BUCKET}/${VERSION_PREFIX}/$(basename "${file}")" --endpoint-url "${ENDPOINT}"
          done

      - name: Print published URLs
        shell: bash
        env:
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: |
          echo "Published installer:"
          echo "${R2_PUBLIC_BASE_URL%/}/install.sh"
          echo "${R2_PUBLIC_BASE_URL%/}/agentnet/install.sh"
          echo "Published release manifest:"
          echo "${R2_PUBLIC_BASE_URL%/}/${RELEASE_PREFIX}/releases/v${VERSION}/manifest.json"
          echo "Published latest manifest:"
          echo "${R2_PUBLIC_BASE_URL%/}/${RELEASE_PREFIX}/releases/latest.json"
