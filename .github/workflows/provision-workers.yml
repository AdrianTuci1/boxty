name: Provision Workers

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Cloud provider"
        required: true
        type: choice
        default: "aws"
        options:
          - aws
          - gcp
          - azure
      count:
        description: "Number of workers"
        required: true
        type: string
        default: "1"
      region:
        description: "Region"
        required: true
        type: string
        default: "us-east-1"

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform init
        working-directory: infra/terraform/${{ github.event.inputs.provider }}
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="count=${{ github.event.inputs.count }}" \
            -var="region=${{ github.event.inputs.region }}"
        working-directory: infra/terraform/${{ github.event.inputs.provider }}
        env:
          TF_VAR_api_url: ${{ vars.API_URL }}
          TF_VAR_worker_api_key: ${{ secrets.WORKER_API_KEY }}
