name: 📦 Build and Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
        type: string
      publish_sdk_python:
        description: 'Publish Python SDK to PyPI'
        required: true
        type: boolean
        default: true
      publish_sdk_js:
        description: 'Publish JS SDK to npm'
        required: true
        type: boolean
        default: true
      publish_cli:
        description: 'Build and publish CLI binaries to R2'
        required: true
        type: boolean
        default: true
      publish_cli_python:
        description: 'Publish Python Modal-style CLI (boxty-cli) to PyPI'
        required: true
        type: boolean
        default: true
      deploy_web:
        description: 'Deploy web page to Cloudflare Pages'
        required: true
        type: boolean
        default: true
      web_environment:
        description: 'Web environment (production | staging)'
        required: true
        type: choice
        options:
          - production
          - staging
        default: production

env:
  VERSION: ${{ github.event.inputs.version }}
  VITE_API_BASE: ${{ github.event.inputs.web_environment == 'production' && secrets.VITE_API_BASE_PRODUCTION || secrets.VITE_API_BASE_STAGING }}
  VITE_DEMO_MODE: ${{ github.event.inputs.web_environment == 'production' && secrets.VITE_DEMO_MODE_PRODUCTION || secrets.VITE_DEMO_MODE_STAGING }}
  VITE_DEV_MODE: 'false'
  VITE_USE_MOCKS: 'false'
  VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
  VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
  VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version format
        run: |
          if [[ ! "${{ env.VERSION }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Expected: x.y.z"
            exit 1
          fi
          echo "Version: ${{ env.VERSION }}"

  sdk-python-build:
    needs: validate
    if: github.event.inputs.publish_sdk_python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install build hatch
      - run: sed -i 's/^version = ".*"/version = "${{ env.VERSION }}"/' pyproject.toml
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-python-dist
          path: sdk/python/dist/

  sdk-python-publish:
    needs: sdk-python-build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with: { name: sdk-python-dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist

  sdk-js-build:
    needs: validate
    if: github.event.inputs.publish_sdk_js == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm ci
      - run: npm version ${{ env.VERSION }} --no-git-tag-version --allow-same-version
      - run: npm run build
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-js-dist
          path: sdk/js/*.tgz

  sdk-js-publish:
    needs: sdk-js-build
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - uses: actions/download-artifact@v4
        with: { name: sdk-js-dist, path: dist }
      - run: |
          cd dist
          npm publish $(ls *.tgz | head -1) --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  cli-python-build:
    needs: validate
    if: github.event.inputs.publish_cli_python == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install build hatch
      - run: sed -i 's/^version = ".*"/version = "${{ env.VERSION }}"/' pyproject.toml
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: cli-python-dist
          path: cli/dist/

  cli-python-publish:
    needs: cli-python-build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with: { name: cli-python-dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist

  cli-build:
    needs: validate
    if: github.event.inputs.publish_cli == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: boxty-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: boxty-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: boxty-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: boxty-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build release
        working-directory: cli-worker
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare binary
        shell: bash
        run: |
          mkdir -p cli-binaries
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp cli-worker/target/${{ matrix.target }}/release/boxty-worker cli-binaries/${{ matrix.name }}
          else
            cp cli-worker/target/${{ matrix.target }}/release/boxty-worker cli-binaries/${{ matrix.name }}
          fi
          ls -la cli-binaries/
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: cli-binaries/

  cli-release:
    needs: cli-build
    runs-on: ubuntu-latest
    steps:
      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          path: cli-all
          merge-multiple: true
      - run: ls -la cli-all/
      - uses: sigstore/cosign-installer@v3
      - name: Generate signing key
        run: cosign generate-key-pair k8s://boxty/cosign
        env:
          COSIGN_PASSWORD: ""
      - name: Sign binaries
        run: |
          for f in cli-all/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes --key cosign.key --output-signature "${f}.sig" "$f"
            sha256sum "$f" > "${f}.sha256"
          done
        env:
          COSIGN_PASSWORD: ""
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Boxty CLI v${{ env.VERSION }}
          files: cli-all/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          pip install awscli
          for f in cli-all/*; do
            aws s3 cp "$f" "s3://${R2_BUCKET}/cli/${{ env.VERSION }}/$(basename $f)" --endpoint-url=${AWS_ENDPOINT_URL}
            aws s3 cp "$f" "s3://${R2_BUCKET}/cli/latest/$(basename $f)" --endpoint-url=${AWS_ENDPOINT_URL}
          done
      - name: Upload public key to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp cosign.pub "s3://${R2_BUCKET}/cli/cosign.pub" --endpoint-url=${AWS_ENDPOINT_URL}

      - name: Generate install.sh
        run: |
          cp infrastructure/scripts/install.sh cli-all/install.sh
          sed -i 's|^BASE_URL=.*|BASE_URL="${{ env.CLI_BASE_URL }}"|' cli-all/install.sh || true
        env:
          CLI_BASE_URL: ${{ secrets.CLI_BASE_URL || 'https://cli.boxty.dev' }}

      - name: Upload install.sh to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          aws s3 cp cli-all/install.sh "s3://${R2_BUCKET}/install.sh" --endpoint-url=${AWS_ENDPOINT_URL}
          aws s3 cp cli-all/install.sh "s3://${R2_BUCKET}/cli/install.sh" --endpoint-url=${AWS_ENDPOINT_URL}

      - name: Upload latest.json to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          printf '%s\n' '{' '"version": "${{ env.VERSION }}",' '"platforms": {' '"linux-x64": "boxty-linux-x64",' '"macos-x64": "boxty-macos-x64",' '"macos-arm64": "boxty-macos-arm64",' '"windows-x64": "boxty-windows-x64.exe"' '},' '"baseUrl": "${{ secrets.CLI_BASE_URL || 'https://cli.boxty.dev' }}"' '}' > cli-all/latest.json
          aws s3 cp cli-all/latest.json "s3://${R2_BUCKET}/cli/latest.json" --endpoint-url=${AWS_ENDPOINT_URL}
          aws s3 cp cli-all/latest.json "s3://${R2_BUCKET}/cli/${{ env.VERSION }}/manifest.json" --endpoint-url=${AWS_ENDPOINT_URL}

  web-build:
    needs: validate
    if: github.event.inputs.deploy_web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - name: Build web with environment
        env:
          VITE_API_BASE: ${{ env.VITE_API_BASE }}
          VITE_DEMO_MODE: ${{ env.VITE_DEMO_MODE }}
          VITE_DEV_MODE: ${{ env.VITE_DEV_MODE }}
          VITE_USE_MOCKS: ${{ env.VITE_USE_MOCKS }}
          VITE_STRIPE_PUBLIC_KEY: ${{ env.VITE_STRIPE_PUBLIC_KEY }}
          VITE_POSTHOG_KEY: ${{ env.VITE_POSTHOG_KEY }}
          VITE_SENTRY_DSN: ${{ env.VITE_SENTRY_DSN }}
        run: npm run build
      - name: Inject CLI download info
        run: |
          printf '%s\n' '{' '"version": "${{ env.VERSION }}",' '"platforms": {' '"linux-x64": "boxty-linux-x64",' '"macos-x64": "boxty-macos-x64",' '"macos-arm64": "boxty-macos-arm64",' '"windows-x64": "boxty-windows-x64.exe"' '},' '"baseUrl": "https://cli.boxty.dev"' '}' > dist/cli-info.json
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  web-deploy:
    needs: [web-build, cli-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: web-dist }
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
          directory: web-dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [sdk-python-publish, sdk-js-publish, cli-python-publish, cli-release, web-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           BOXTY RELEASE v${{ env.VERSION }}                            ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║  Python SDK (PyPI):    ${{ needs.sdk-python-publish.result == 'success' && 'OK' || 'FAIL' }}                               ║"
          echo "║  JS SDK (npm):         ${{ needs.sdk-js-publish.result == 'success' && 'OK' || 'FAIL' }}                               ║"
          echo "║  Python CLI (PyPI):    ${{ needs.cli-python-publish.result == 'success' && 'OK' || 'FAIL' }}                               ║"
          echo "║  CLI Binaries:         ${{ needs.cli-release.result == 'success' && 'OK' || 'FAIL' }}                               ║"
          echo "║  Web (Cloudflare):     ${{ needs.web-deploy.result == 'success' && 'OK' || 'FAIL' }}                               ║"
          echo "║  Web Environment:      ${{ github.event.inputs.web_environment }}                            ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Install:"
          echo "  pip install boxty==${{ env.VERSION }}"
          echo "  pip install boxty-cli==${{ env.VERSION }}"
          echo "  npm install @boxty/sdk@${{ env.VERSION }}"
          echo "  curl -fsSL https://cli.boxty.dev/install.sh | sh"
