name: 🏗️ Provision Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      control_plane_ip:
        description: Public IP of the existing control plane VPS
        required: true
        type: string
      terraform_action:
        description: Terraform action
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VAR_environment: ${{ github.event.inputs.environment }}
  TF_VAR_control_plane_ip: ${{ github.event.inputs.control_plane_ip }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.terraform_action == 'apply'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.terraform_action == 'destroy'
        run: terraform destroy -auto-approve

      - name: Output Terraform values
        if: github.event.inputs.terraform_action == 'apply'
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform outputs
        if: github.event.inputs.terraform_action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ github.event.inputs.environment }}
          path: infrastructure/terraform/terraform-outputs.json
