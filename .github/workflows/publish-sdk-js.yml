name: Publish SDK JS

on:
  push:
    tags:
      - "sdk-js-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
        working-directory: sdk-js
      - run: npm run build
        working-directory: sdk-js
      - run: npm publish --access public
        working-directory: sdk-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
