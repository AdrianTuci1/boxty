name: Deploy Workers Contabo

on:
  workflow_call:
    inputs:
      inventory_path:
        description: Ansible inventory path
        required: true
        type: string
      target_group:
        description: Ansible target group
        required: true
        type: string
  workflow_dispatch:
    inputs:
      inventory_path:
        description: Ansible inventory path
        required: true
        default: infrastructure/ansible/inventory.yml
      target_group:
        description: Ansible target group
        required: true
        default: boxty_workers

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Write worker SSH key
        env:
          WORKER_SSH_KEY: ${{ secrets.WORKER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$WORKER_SSH_KEY" > ~/.ssh/boxty_workers
          chmod 600 ~/.ssh/boxty_workers

      - name: Deploy worker fleet
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
          BOXTY_VERSION: ${{ github.event.inputs.version || 'latest' }}
          BOXTY_CONTROL_PLANE_URL: ${{ secrets.BOXTY_CONTROL_PLANE_URL }}
          BOXTY_PROVIDER_SHARED_TOKEN: ${{ secrets.BOXTY_PROVIDER_SHARED_TOKEN }}
          BOXTY_R2_ACCOUNT_ID: ${{ secrets.BOXTY_R2_ACCOUNT_ID }}
          BOXTY_R2_BUCKET: ${{ secrets.BOXTY_R2_BUCKET }}
          BOXTY_R2_ACCESS_KEY_ID: ${{ secrets.BOXTY_R2_ACCESS_KEY_ID }}
          BOXTY_R2_SECRET_ACCESS_KEY: ${{ secrets.BOXTY_R2_SECRET_ACCESS_KEY }}
          BOXTY_R2_PUBLIC_BASE_URL: ${{ secrets.BOXTY_R2_PUBLIC_BASE_URL }}
          BOXTY_RUNPOD_API_KEY: ${{ secrets.BOXTY_RUNPOD_API_KEY }}
          BOXTY_RUNPOD_DEFAULT_TEMPLATE: ${{ secrets.BOXTY_RUNPOD_DEFAULT_TEMPLATE }}
          BOXTY_NODE_KEY: ${{ secrets.BOXTY_NODE_KEY }}
          BOXTY_LLM_API_KEY: ${{ secrets.BOXTY_LLM_API_KEY }}
        run: |
          ansible-playbook -i "${{ inputs.inventory_path }}" infrastructure/ansible/deploy-workers.yml --limit "${{ inputs.target_group }}"
