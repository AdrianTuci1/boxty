all:
  children:
    boxty_control_plane:
      hosts:
        control-01:
          ansible_host: 198.51.100.20
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/control_plane
          boxty_region: eu-central
      vars:
        ansible_python_interpreter: /usr/bin/python3
        boxty_provider_pool: general
        boxty_runpod_enabled: true
        # Secrets must be provided via GitHub Secrets or CI environment variables
        # See ansible/DEPLOYMENT.md for the full list of required secrets
    boxty_workers:
      hosts:
        worker-01:
          ansible_host: 203.0.113.10
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/boxty_workers
          boxty_region: eu-central
          boxty_labels:
            gpu: "true"
            tier: premium
        worker-02:
          ansible_host: 203.0.113.11
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/boxty_workers
          boxty_region: eu-west
          boxty_labels:
            gpu: "false"
            tier: standard
      vars:
        ansible_python_interpreter: /usr/bin/python3
        boxty_control_plane_url: https://control.boxty.dev
        boxty_provider_pool: general
        boxty_concurrency: 4
        boxty_max_memory: 2048
        boxty_max_cpu: 2
        boxty_allow_public_ssh: false
        boxty_runpod_enabled: true
        boxty_runpod_default_template: gpu-inference
        boxty_gateway_port: 0
        # Secrets must be provided via GitHub Secrets or CI environment variables
        # See ansible/DEPLOYMENT.md for the full list of required secrets
