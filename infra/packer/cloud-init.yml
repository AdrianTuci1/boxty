#cloud-config

package_update: true

packages:
  - containerd
  - docker.io

write_files:
  - path: /etc/environment
    content: |
      BOXY_WORKER_ID=${worker_id}
      API_URL=${api_url}
      WORKER_API_KEY=${worker_key}
      PROVIDER=${provider}
      REGION=${region}
    append: true

runcmd:
  - systemctl enable --now containerd
  - systemctl enable --now docker
  - |
    docker run -d --name boxty-worker \
      -e BOXY_WORKER_ID="${worker_id}" \
      -e API_URL="${api_url}" \
      -e WORKER_API_KEY="${worker_key}" \
      -e PROVIDER="${provider}" \
      -e REGION="${region}" \
      -v /var/run/containerd:/var/run/containerd \
      --privileged \
      boxty/worker:latest
